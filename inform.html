<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Mag</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"/>
  
  <style>
  .photos{
    gap: 30px;
    display: flex;
    padding: 5px;
    justify-content: center;
    align-items: center;
    border: 5px solid brown;
  }
  .photos img{
    width: 35px;
    height: 35px;
    padding: 5px;
    border-radius: 90px;
    background-color: #f6f6f6;
    border: 1px solid #000066;
  }
  .photos img::hover {
    cursor: pointer;
    background-color: #cbcbcb;
  }
  </style>
  <body>
    <h2>Get in Touch with our Socials Account</h2>
    <div class="photos">
      <a href="#" id="imglnk">
        <img alt="fbimg" src="facebook.png">
      </a>
      <a href="#" id="imglnk1">
        <img alt="eimg" src="google.png">
      </a>
      <a href="#" id="imglnk2">
        <img alt="twimg" src="twitter.png">
      </a>
    </div>
  </body>
</html>
