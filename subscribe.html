<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>recipemag/subscribe..</title>
    <link rel="stylesheet" href="l.css">
    <style>
    body{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Outfit", sans-serif;
    }
    .container{
      padding: 5px;
      animation: cardEnter 0.4s cubic-bezier(0.2, 0, 0.2, 1) both;
    }
    .title {
      /*border: 5px solid brown;*/
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    h3{
      color: #000066;
    }
    .send {
      width: 250px;
      height: 250px;
      margin: 10px auto;
    }
    .email {
      width: 100%;
      height: 100%;
    }
/*
 .meals{
     border: 5px solid indigo;
  }*/
    .nameids{
      display: flex;
      flex-direction: column;
    }
    #nameid, #mailid, #btn{
      margin: 5px;
      padding: 10px;
      border: 1px solid gray;
      border-radius: 5px;
    }
    #nameid:focus {
      outline: none;
      font-size: 14px;
      font-weight: bold;
      background-color: #f6f6f6;
    }
    #mailid:focus{
      outline: none;
      font-size: 14px;
      font-weight: bold;
      background-color: #f6f6f6;
    }
    #btn{
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
      font-weight: strong;
      background-color: #CC3300;
    }
    #btn:hover{
      background-color: #b02c00;
    }
    .photos{
      gap: 49px;
      display: flex;
      padding: 5px;
      margin: 10px;
      justify-content: center;
      align-items: center;
    }
    .photos img{
      width: 35px;
      height: 35px;
      padding: 5px;
      border-radius: 90px;
      background-color: #f6f6f6;
      border: 1px solid #000066;
      transition: transform 0.14s ease-out;
    }
    .photos img:hover {
      cursor: pointer;
      background-color: #cbcbcb;
    }
    .photos img:active{
      transform: scale(0.80);
    }
    
    @keyframes cardEnter{
      from{
        opacity: 0;
        transform: translateY(24px) scale(0.95);
      }
      to{
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="send">
        <video class="email" autoplay loop muted playsinline>
            <source src="email.mp4" type="video/mp4">
        </video>
      </div>
      <div class="title">
        <h3>Get notified on various continental and inter-continental dishes, and how there are prepared</h3>
      </div>
      <div class="meals">
        <form name="signup" class="nameids">
          <input type="text" placeholder="your name" name="uname" id="nameid" required>
          <input type="email" placeholder="your email" name="mail" id="mailid" required>
          <button onclick="activate()" id="btn">Subscribe</button>
        </form>
      </div>
      <div class="photos">
        <a href="#" id="imglnk">
          <img alt="fbimg" src="facebook.png">
          </a>
        <a href="#" id="imglnk1">
          <img alt="eimg" src="youtube.png">
        </a>
        <a href="#" id="imglnk2">
          <img alt="twimg" src="twitter.png">
        </a>
      </div>
    </div>
  </body>
</html>
